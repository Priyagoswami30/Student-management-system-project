{% extends 'base.html' %}
{% block title %}Students — StudentMgmt{% endblock %}
{% block content %}
<div class="page-header">
<h2>Students</h2>
<form method="get" action="{{ url_for('index') }}" class="search-form">
<input name="q" value="{{ q }}" placeholder="Search name, roll or class">
<button type="submit" class="btn-primary">Search</button>
</form>
</div>


<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Class</th>
<th>Age</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.roll }}</td>
<td>{{ s.class or '-' }}</td>
<td>{{ s.age or '-' }}</td>
<td>
<a class="btn-secondary" href="{{ url_for('view_student', id=s._id) }}">View</a>
<a class="btn-secondary" href="{{ url_for('edit_student', id=s._id) }}">Edit</a>
<form method="post" action="{{ url_for('delete_student', id=s._id) }}" onsubmit="return confirm('Delete this student?');" class="inline">
<button type="submit" class="btn-danger">Delete</button>
</form>
</td>
</tr>
{% else %}
<tr><td colspan="5" class="text-center">No students found.</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
