{% extends 'base.html' %}
{% block title %}Add Student — StudentMgmt{% endblock %}
{% block content %}
<div class="form-card">
<h3>Add Student</h3>
<form method="post">
<label>Name *</label>
<input name="name" value="{{ name or '' }}" required>


<label>Roll *</label>
<input name="roll" value="{{ roll or '' }}" required>


<label>Class</label>
<input name="class" value="{{ sclass or '' }}">


<label>Email</label>
<input type="email" name="email" value="{{ email or '' }}">


<label>Age</label>
<input type="number" min="1" name="age" value="{{ age or '' }}">


<div class="form-actions">
<button type="submit" class="btn-primary">Create</button>
<a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
</div>
</form>
</div>
{% endblock %}
