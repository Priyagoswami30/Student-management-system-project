{% extends 'base.html' %}
{% block title %}{{ student.name }} — Student Details{% endblock %}
{% block content %}
<div class="detail-card">
<h3>{{ student.name }}</h3>
<p><strong>Roll:</strong> {{ student.roll }}</p>
<p><strong>Class:</strong> {{ student.class or '-' }}</p>
<p><strong>Email:</strong> {{ student.email or '-' }}</p>
<p><strong>Age:</strong> {{ student.age or '-' }}</p>


<div class="form-actions">
<a href="{{ url_for('edit_student', id=student._id) }}" class="btn-primary">Edit</a>
<form method="post" action="{{ url_for('delete_student', id=student._id) }}" onsubmit="return confirm('Delete this student?');" class="inline">
<button class="btn-danger">Delete</button>
</form>
<a href="{{ url_for('index') }}" class="btn-secondary">Back</a>
</div>
</div>
{% endblock %}
