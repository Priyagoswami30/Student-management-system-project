{% extends 'base.html' %}
{% block title %}Edit {{ student.name }} — StudentMgmt{% endblock %}
{% block content %}
<div class="form-card">
<h3>Edit Student</h3>
<form method="post">
<label>Name *</label>
<input name="name" value="{{ student.name or '' }}" required>


<label>Roll *</label>
<input name="roll" value="{{ student.roll or '' }}" required>


<label>Class</label>
<input name="class" value="{{ student.class or '' }}">


<label>Email</label>
<input type="email" name="email" value="{{ student.email or '' }}">


<label>Age</label>
<input type="number" min="1" name="age" value="{{ student.age or '' }}">


<div class="form-actions">
<button type="submit" class="btn-primary">Save</button>
<a href="{{ url_for('view_student', id=student._id) }}" class="btn-secondary">Cancel</a>
</div>
</form>
</div>
{% endblock %}
