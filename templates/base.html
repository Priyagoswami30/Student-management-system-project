<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}StudentPulse{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="site-shell">
<header class="navbar">
<div class="container nav-container">
<a href="{{ url_for('index') }}" class="logo">StudentPulse</a>
<nav class="nav-actions">
<a href="{{ url_for('index') }}" class="nav-link">All Students</a>
<a href="{{ url_for('add_student') }}" class="btn-primary">Add Student</a>
</nav>
</div>
</header>

<main class="container page-container">
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-messages">
{% for category, msg in messages %}
<div class="flash {{ category }}">{{ msg }}</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}


{% block content %}{% endblock %}
</main>


<footer class="footer">
<div class="container">©StudentPulse</div>
</footer>
</div>
</body>
</html>
