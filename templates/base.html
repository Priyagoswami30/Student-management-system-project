<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}Student Management{% endblock %}</title>


<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="navbar">
<div class="container nav-container">
<a href="{{ url_for('index') }}" class="logo">StudentMgmt</a>
<nav>
<a href="{{ url_for('add_student') }}" class="btn-primary">Add Student</a>
</nav>
</div>
</header>


<main class="container">
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-messages">
{% for category, msg in messages %}
<div class="flash {{ category }}">{{ msg }}</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}


{% block content %}{% endblock %}
</main>


<footer class="footer">
<div class="container">© StudentMgmt — Built with ❤️</div>
</footer>
</body>
</html>
